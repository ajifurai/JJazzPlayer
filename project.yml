name: JJaZZPlayer
options:
  bundleIdPrefix: com.shin
  deploymentTarget:
    iOS: "17.0"

targets:
  JJaZZPlayer:
    type: application
    platform: iOS
    sources:
      - path: Sources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shin.JJaZZPlayer
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: minimal
        TARGETED_DEVICE_FAMILY: "1,2"
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        DEVELOPMENT_TEAM: F49874RTJM
        CODE_SIGN_STYLE: Automatic
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    info:
      path: Sources/Info.plist
      properties:
        UILaunchStoryboardName: ""
        UIBackgroundModes:
          - audio
        NSAppTransportSecurity:
          NSExceptionDomains:
            jjazz-aod.leanstream.co:
              NSExceptionAllowsInsecureHTTPLoads: false
              NSThirdPartyExceptionRequiresForwardSecrecy: false
              NSExceptionMinimumTLSVersion: TLSv1.2

  JJaZZPlayerTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests
    dependencies:
      - target: JJaZZPlayer
    settings:
      base:
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: minimal
        GENERATE_INFOPLIST_FILE: YES
        DEVELOPMENT_TEAM: F49874RTJM
        CODE_SIGN_STYLE: Automatic
